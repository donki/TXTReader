<?xml version="1.0" encoding="UTF-8"?>
<!-- Primer plano: documento blanco con líneas de texto y "TXT" en morado de marca.
     Glifo grande y de alto contraste sobre el fondo morado. -->
<svg xmlns="http://www.w3.org/2000/svg" width="456" height="456" viewBox="0 0 456 456">

  <!-- Documento blanco con esquina doblada -->
  <path d="M128 96
           a20 20 0 0 1 20 -20
           h116
           l56 56
           v208
           a20 20 0 0 1 -20 20
           H148
           a20 20 0 0 1 -20 -20
           Z" fill="#FFFFFF" />
  <path d="M264 76 l56 56 h-44 a12 12 0 0 1 -12 -12 Z" fill="#C9B8F0" />

  <!-- Líneas de texto superiores -->
  <rect x="156" y="150" width="120" height="12" rx="6" fill="#8B7BC7" />
  <rect x="156" y="176" width="150" height="12" rx="6" fill="#8B7BC7" />

  <!-- "TXT" grande -->
  <text x="234" y="288" font-family="Arial, Helvetica, sans-serif" font-size="88"
        font-weight="900" text-anchor="middle" fill="#512BD4">TXT</text>

  <!-- Líneas de texto inferiores -->
  <rect x="156" y="316" width="140" height="12" rx="6" fill="#8B7BC7" />
  <rect x="156" y="342" width="104" height="12" rx="6" fill="#8B7BC7" />

</svg>
